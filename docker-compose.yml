services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "28080:18080"
    volumes:
      - juanbing-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=data/juanbing.sqlite
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-at-least-32-chars-long}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-$$2b$$10$$nA1DjKqLQDSG/lTG/X/ftO1MRdBTIrX0bgxzKoh9rZf0xgMJo4xR6}
      - COOKIE_SECURE=false
    restart: unless-stopped

volumes:
  juanbing-data:
