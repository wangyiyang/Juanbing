services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "28080:18080"
    volumes:
      - juanbing-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=data/juanbing.sqlite
      # 请务必修改以下默认值！
      # SESSION_SECRET: 至少 32 个字符的随机字符串
      - SESSION_SECRET=${SESSION_SECRET}
      # ADMIN_USERNAME: 管理员用户名
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      # ADMIN_PASSWORD_HASH: 使用 bcryptjs 生成的密码哈希
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - COOKIE_SECURE=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  juanbing-data:
